<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChromaFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1b2d;
    --bg2: #162235;
    --panel: #1e2f45;
    --panel2: #253650;
    --accent: #7ee8fa;
    --accent2: #eec0c6;
    --text: #e8f4f8;
    --text2: #8aa8c0;
    --shadow: rgba(0,0,0,0.4);

    --c1: #ff6b8a;
    --c2: #ffb347;
    --c3: #7ee8fa;
    --c4: #b5ead7;
    --c5: #c7b3f4;
    --c6: #ffd166;

    --tube-w: 52px;
    --tube-h: 200px;
    --cell-size: 38px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Ambient background blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 400px; height: 400px;
    background: var(--c3);
    top: -100px; left: -100px;
    animation: blob1 12s ease-in-out infinite alternate;
  }
  body::after {
    width: 350px; height: 350px;
    background: var(--c5);
    bottom: -80px; right: -80px;
    animation: blob2 10s ease-in-out infinite alternate;
  }
  @keyframes blob1 { to { transform: translate(80px, 120px) scale(1.2); } }
  @keyframes blob2 { to { transform: translate(-60px, -80px) scale(0.9); } }

  #app {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 12px 24px;
    position: relative;
    z-index: 1;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 4px 8px;
  }
  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: 28px;
    background: linear-gradient(135deg, var(--c3), var(--c5));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  .score-area {
    display: flex;
    gap: 10px;
  }
  .score-box {
    background: var(--panel);
    border-radius: 12px;
    padding: 6px 14px;
    text-align: center;
    border: 1px solid var(--panel2);
  }
  .score-box .label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }
  .score-box .value { font-size: 18px; font-weight: 800; color: var(--accent); }

  /* ── PHASE INDICATOR ── */
  .phase-bar {
    width: 100%;
    display: flex;
    gap: 8px;
    margin: 8px 0 14px;
  }
  .phase-btn {
    flex: 1;
    padding: 8px;
    border-radius: 12px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: default;
    transition: all 0.4s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .phase-btn.active {
    background: linear-gradient(135deg, var(--c3), var(--c5));
    color: var(--bg);
    box-shadow: 0 4px 20px rgba(126,232,250,0.3);
  }
  .phase-btn.inactive {
    background: var(--panel);
    color: var(--text2);
  }

  /* ── GRID (Phase 1) ── */
  #phase1 { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  #phase2 { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 16px; display: none; }

  .grid-wrapper {
    background: var(--panel);
    border-radius: 20px;
    padding: 12px;
    border: 1px solid var(--panel2);
    box-shadow: 0 8px 32px var(--shadow);
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(8, var(--cell-size));
    grid-template-rows: repeat(8, var(--cell-size));
    gap: 3px;
  }

  .cell {
    width: var(--cell-size);
    height: var(--cell-size);
    border-radius: 8px;
    background: var(--bg2);
    border: 1px solid var(--panel2);
    transition: background 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .cell.preview { opacity: 0.6; transform: scale(0.95); }
  .cell.filled { border-color: transparent; }
  .cell.flash {
    animation: cellFlash 0.4s ease-out;
  }
  @keyframes cellFlash {
    0% { transform: scale(1.15); filter: brightness(1.8); }
    100% { transform: scale(1); filter: brightness(1); }
  }

  /* ── BLOCKS TRAY ── */
  .blocks-tray {
    width: 100%;
    background: var(--panel);
    border-radius: 20px;
    padding: 14px 10px;
    border: 1px solid var(--panel2);
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    min-height: 110px;
  }

  .block-piece {
    display: grid;
    gap: 3px;
    cursor: grab;
    transition: transform 0.2s, filter 0.2s;
    touch-action: none;
  }
  .block-piece:active { cursor: grabbing; transform: scale(1.1); filter: brightness(1.2); }
  .block-piece.used { opacity: 0.2; pointer-events: none; }

  .block-cell {
    width: 22px;
    height: 22px;
    border-radius: 5px;
  }

  /* ── TUBES (Phase 2) ── */
  .tubes-section {
    width: 100%;
    background: var(--panel);
    border-radius: 20px;
    padding: 16px 10px;
    border: 1px solid var(--panel2);
    box-shadow: 0 8px 32px var(--shadow);
  }
  .tubes-title {
    text-align: center;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
  }

  #tubes-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .tube {
    width: var(--tube-w);
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .tube:hover { transform: translateY(-4px); }
  .tube.selected .tube-body { box-shadow: 0 0 0 3px var(--accent), 0 8px 20px rgba(126,232,250,0.4); }
  .tube.complete .tube-body { box-shadow: 0 0 0 3px #b5ead7, 0 8px 20px rgba(181,234,215,0.4); }

  .tube-body {
    width: 44px;
    height: 176px;
    background: rgba(255,255,255,0.05);
    border: 2px solid var(--panel2);
    border-top: none;
    border-radius: 0 0 22px 22px;
    overflow: hidden;
    display: flex;
    flex-direction: column-reverse;
    transition: box-shadow 0.2s;
    position: relative;
  }
  .tube-top {
    width: 50px;
    height: 8px;
    background: var(--panel2);
    border-radius: 6px 6px 0 0;
    margin-bottom: 0;
  }

  .tube-layer {
    width: 100%;
    flex-shrink: 0;
    transition: height 0.3s ease, background 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .tube-layer::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
  }

  /* pour animation */
  @keyframes pour {
    0% { transform: scaleY(0); transform-origin: top; }
    100% { transform: scaleY(1); transform-origin: top; }
  }
  .tube-layer.pouring { animation: pour 0.3s ease-out; }

  /* ── BUTTONS ── */
  .btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 14px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: linear-gradient(135deg, var(--c3), var(--c5));
    color: var(--bg);
    box-shadow: 0 4px 16px rgba(126,232,250,0.25);
  }
  .btn-secondary {
    background: var(--panel);
    color: var(--text2);
    border: 1px solid var(--panel2);
  }
  .btn-success {
    background: linear-gradient(135deg, #b5ead7, #7ee8fa);
    color: var(--bg);
    box-shadow: 0 4px 16px rgba(181,234,215,0.3);
  }

  /* ── LEVEL COMPLETE overlay ── */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,27,45,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
    backdrop-filter: blur(6px);
  }
  #overlay.show { opacity: 1; pointer-events: all; }

  .overlay-card {
    background: var(--panel);
    border-radius: 28px;
    padding: 36px 32px;
    text-align: center;
    border: 1px solid var(--panel2);
    max-width: 320px;
    width: 90%;
    transform: scale(0.8);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }
  #overlay.show .overlay-card { transform: scale(1); }

  .overlay-emoji { font-size: 64px; margin-bottom: 16px; }
  .overlay-title {
    font-family: 'Fredoka One', cursive;
    font-size: 32px;
    background: linear-gradient(135deg, var(--c3), var(--c5));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .overlay-sub { color: var(--text2); margin-bottom: 24px; font-size: 15px; }
  .overlay-score { font-size: 40px; font-weight: 800; color: var(--accent); margin-bottom: 24px; }

  /* ── PROGRESS ── */
  .progress-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .progress-bar {
    flex: 1;
    height: 8px;
    background: var(--panel);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--c3), var(--c5));
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  /* ── HINT ── */
  .hint-box {
    background: var(--panel);
    border-radius: 14px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text2);
    border: 1px solid var(--panel2);
    width: 100%;
    text-align: center;
    line-height: 1.5;
  }
  .hint-box strong { color: var(--accent); }

  /* ── COLLECTED TUBES MINI ── */
  .collected-row {
    width: 100%;
    background: var(--panel);
    border-radius: 16px;
    padding: 12px;
    border: 1px solid var(--panel2);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }
  .mini-tube {
    width: 28px;
    height: 70px;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid var(--panel2);
    border-top: none;
    border-radius: 0 0 14px 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column-reverse;
  }
  .mini-layer { width: 100%; }

  /* Scrollable for small screens */
  @media (max-height: 700px) {
    :root { --cell-size: 32px; --tube-h: 160px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">ChromaFlow</div>
    <div class="score-area">
      <div class="score-box">
        <div class="label">Level</div>
        <div class="value" id="level-display">1</div>
      </div>
      <div class="score-box">
        <div class="label">Score</div>
        <div class="value" id="score-display">0</div>
      </div>
    </div>
  </header>

  <div class="phase-bar">
    <div class="phase-btn active" id="phase1-btn">🧱 Plaatsen</div>
    <div class="phase-btn inactive" id="phase2-btn">🧪 Sorteren</div>
  </div>

  <!-- PHASE 1: Block placing -->
  <div id="phase1">
    <div class="hint-box">Sleep blokken op het rooster. Vul een <strong>rij of kolom</strong> om vloeistof te verzamelen! 💧</div>

    <div class="grid-wrapper">
      <div id="grid"></div>
    </div>

    <div class="progress-row">
      <span class="progress-label">Buizen: <span id="tubes-progress">0</span>/<span id="tubes-needed">4</span></span>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>

    <!-- Collected mini tubes -->
    <div class="collected-row" id="collected-mini"></div>

    <div class="blocks-tray" id="blocks-tray"></div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="resetPhase1()">↩ Opnieuw</button>
      <button class="btn btn-primary" id="sort-btn" onclick="goToPhase2()" disabled style="opacity:0.4">🧪 Sorteren →</button>
    </div>
  </div>

  <!-- PHASE 2: Sorting -->
  <div id="phase2">
    <div class="hint-box">Tik op een buis om te selecteren, dan op een andere om te <strong>gieten</strong>. Sorteer alle kleuren! 🎨</div>

    <div class="tubes-section">
      <div class="tubes-title">Sorteer de buizen</div>
      <div id="tubes-container"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="undoPour()">↩ Undo</button>
      <button class="btn btn-secondary" onclick="resetSort()">🔄 Reset</button>
    </div>
  </div>
</div>

<!-- Overlay -->
<div id="overlay">
  <div class="overlay-card">
    <div class="overlay-emoji" id="overlay-emoji">🎉</div>
    <div class="overlay-title" id="overlay-title">Level Klaar!</div>
    <div class="overlay-sub" id="overlay-sub">Geweldig gesorteerd!</div>
    <div class="overlay-score" id="overlay-score">+500</div>
    <button class="btn btn-success" style="width:100%" onclick="nextLevel()">Volgende Level →</button>
  </div>
</div>

<script>
// ─── COLORS ───────────────────────────────────────────────
const COLORS = [
  { id: 1, hex: '#ff6b8a', name: 'Rood' },
  { id: 2, hex: '#ffb347', name: 'Oranje' },
  { id: 3, hex: '#7ee8fa', name: 'Blauw' },
  { id: 4, hex: '#b5ead7', name: 'Groen' },
  { id: 5, hex: '#c7b3f4', name: 'Paars' },
  { id: 6, hex: '#ffd166', name: 'Geel' },
];

const BLOCK_SHAPES = [
  [[1,1],[1,1]],            // 2x2
  [[1,1,1]],                // 1x3
  [[1],[1],[1]],            // 3x1
  [[1,1,1],[0,0,1]],        // L-shape
  [[1,1,1],[1,0,0]],        // J-shape
  [[1,1],[0,1],[0,1]],      // tall L
  [[1,0],[1,1],[0,1]],      // S
  [[0,1],[1,1],[1,0]],      // Z
  [[1,1,1,1]],              // 1x4
  [[1],[1],[1],[1]],         // 4x1
  [[1,1],[1,1],[1,1]],       // 2x3
  [[1,0],[1,1]],             // small L
  [[0,1],[1,1]],
  [[1,1,1],[0,1,0]],        // T
  [[1]],                    // 1x1
];

// ─── STATE ────────────────────────────────────────────────
const GRID_SIZE = 8;
const TUBE_CAPACITY = 4;

let level = 1;
let score = 0;
let grid = [];          // 8x8, each cell: 0 or colorId
let blocks = [];        // [{shape, colorId, used}]
let selectedBlock = null;
let hoverRow = -1, hoverCol = -1;

let tubesNeeded = 4;
let collectedTubes = [];   // array of tubes (array of colorId layers, bottom first)
let tubes = [];            // working copy for sort phase
let selectedTube = -1;
let sortHistory = [];
let originalTubes = [];

// ─── INIT ─────────────────────────────────────────────────
function init() {
  grid = Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(0));
  collectedTubes = [];
  tubesNeeded = 3 + Math.min(level, 5);
  generateBlocks();
  renderGrid();
  renderBlocks();
  renderCollectedMini();
  updateProgress();
  document.getElementById('level-display').textContent = level;
  document.getElementById('score-display').textContent = score;
  document.getElementById('tubes-needed').textContent = tubesNeeded;
  document.getElementById('sort-btn').disabled = true;
  document.getElementById('sort-btn').style.opacity = '0.4';
  showPhase(1);
}

function getLevelColors() {
  return Math.min(2 + Math.ceil(level / 2), 6);
}

function generateBlocks() {
  const numColors = getLevelColors();
  blocks = Array.from({length: 3}, () => {
    const shape = BLOCK_SHAPES[Math.floor(Math.random() * Math.min(BLOCK_SHAPES.length, 10 + level))];
    const colorId = Math.ceil(Math.random() * numColors);
    return { shape, colorId, used: false };
  });
}

// ─── GRID RENDER ──────────────────────────────────────────
function renderGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (grid[r][c]) {
        cell.style.background = COLORS[grid[r][c]-1].hex;
        cell.classList.add('filled');
      }
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.addEventListener('click', () => placeBlock(r, c));
      cell.addEventListener('mouseover', () => { hoverRow = r; hoverCol = c; renderGridWithPreview(); });
      cell.addEventListener('mouseleave', () => { hoverRow = -1; hoverCol = -1; renderGridWithPreview(); });
      // Touch
      cell.addEventListener('touchstart', (e) => {
        e.preventDefault();
        placeBlock(r, c);
      }, {passive: false});
      g.appendChild(cell);
    }
  }
}

function renderGridWithPreview() {
  const cells = document.querySelectorAll('.cell');
  // Reset preview
  cells.forEach(c => { c.classList.remove('preview'); c.style.background = ''; c.style.borderColor = ''; });

  // Draw existing fills
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const idx = r * GRID_SIZE + c;
      if (grid[r][c]) {
        cells[idx].style.background = COLORS[grid[r][c]-1].hex;
      }
    }
  }

  // Preview selected block
  if (selectedBlock !== null && hoverRow >= 0) {
    const b = blocks[selectedBlock];
    const color = COLORS[b.colorId - 1].hex;
    for (let sr = 0; sr < b.shape.length; sr++) {
      for (let sc = 0; sc < b.shape[sr].length; sc++) {
        if (b.shape[sr][sc]) {
          const gr = hoverRow + sr;
          const gc = hoverCol + sc;
          if (gr < GRID_SIZE && gc < GRID_SIZE && !grid[gr][gc]) {
            const idx = gr * GRID_SIZE + gc;
            cells[idx].style.background = color;
            cells[idx].style.opacity = '0.5';
            cells[idx].classList.add('preview');
          }
        }
      }
    }
  }
}

// ─── BLOCK PLACING ────────────────────────────────────────
function renderBlocks() {
  const tray = document.getElementById('blocks-tray');
  tray.innerHTML = '';
  blocks.forEach((b, i) => {
    if (b.used) {
      const spacer = document.createElement('div');
      spacer.style.width = '50px';
      tray.appendChild(spacer);
      return;
    }
    const piece = document.createElement('div');
    piece.className = 'block-piece';
    piece.style.gridTemplateColumns = `repeat(${b.shape[0].length}, 22px)`;
    piece.style.gridTemplateRows = `repeat(${b.shape.length}, 22px)`;

    b.shape.forEach(row => {
      row.forEach(cell => {
        const d = document.createElement('div');
        d.className = 'block-cell';
        if (cell) d.style.background = COLORS[b.colorId-1].hex;
        else d.style.background = 'transparent';
        piece.appendChild(d);
      });
    });

    piece.addEventListener('click', () => selectBlock(i));
    piece.addEventListener('touchstart', (e) => { e.preventDefault(); selectBlock(i); }, {passive:false});

    if (selectedBlock === i) {
      piece.style.filter = 'brightness(1.3)';
      piece.style.transform = 'scale(1.15)';
      piece.style.outline = `2px solid ${COLORS[b.colorId-1].hex}`;
      piece.style.borderRadius = '6px';
    }
    tray.appendChild(piece);
  });
}

function selectBlock(i) {
  selectedBlock = selectedBlock === i ? null : i;
  renderBlocks();
  renderGridWithPreview();
}

function canPlace(row, col, shape) {
  for (let sr = 0; sr < shape.length; sr++) {
    for (let sc = 0; sc < shape[sr].length; sc++) {
      if (shape[sr][sc]) {
        const gr = row + sr, gc = col + sc;
        if (gr >= GRID_SIZE || gc >= GRID_SIZE) return false;
        if (grid[gr][gc]) return false;
      }
    }
  }
  return true;
}

function placeBlock(row, col) {
  if (selectedBlock === null) return;
  const b = blocks[selectedBlock];
  if (!canPlace(row, col, b.shape)) return;

  // Place
  for (let sr = 0; sr < b.shape.length; sr++) {
    for (let sc = 0; sc < b.shape[sr].length; sc++) {
      if (b.shape[sr][sc]) {
        grid[row + sr][col + sc] = b.colorId;
      }
    }
  }
  b.used = true;
  selectedBlock = null;

  checkLines();
  renderGrid();
  renderBlocks();

  // Auto refresh blocks if all used
  if (blocks.every(b => b.used)) {
    setTimeout(() => { generateBlocks(); renderBlocks(); }, 300);
  }
}

function checkLines() {
  const numColors = getLevelColors();
  let cleared = [];

  // Check rows
  for (let r = 0; r < GRID_SIZE; r++) {
    if (grid[r].every(c => c > 0)) cleared.push({ type: 'row', idx: r });
  }
  // Check cols
  for (let c = 0; c < GRID_SIZE; c++) {
    if (grid.every(row => row[c] > 0)) cleared.push({ type: 'col', idx: c });
  }

  if (!cleared.length) return;

  score += cleared.length * 100 * level;

  cleared.forEach(line => {
    let colors = [];
    if (line.type === 'row') {
      colors = [...grid[line.idx]];
      for (let c = 0; c < GRID_SIZE; c++) flashCell(line.idx, c);
      for (let c = 0; c < GRID_SIZE; c++) grid[line.idx][c] = 0;
    } else {
      colors = grid.map(row => row[line.idx]);
      for (let r = 0; r < GRID_SIZE; r++) flashCell(r, line.idx);
      for (let r = 0; r < GRID_SIZE; r++) grid[r][line.idx] = 0;
    }

    // Build a tube from collected colors (group same colors, max TUBE_CAPACITY per tube)
    const colorCount = {};
    colors.forEach(c => { if (c) colorCount[c] = (colorCount[c]||0)+1; });

    // Create tube layers
    const layers = [];
    Object.entries(colorCount).forEach(([cid, cnt]) => {
      for (let i = 0; i < Math.min(cnt, TUBE_CAPACITY); i++) layers.push(parseInt(cid));
    });

    const tube = layers.slice(0, TUBE_CAPACITY);
    // pad if needed
    while (tube.length < TUBE_CAPACITY) tube.unshift(0);

    collectedTubes.push(tube);
  });

  document.getElementById('score-display').textContent = score;
  updateProgress();
}

function flashCell(r, c) {
  setTimeout(() => {
    const cells = document.querySelectorAll('.cell');
    const cell = cells[r * GRID_SIZE + c];
    if (cell) cell.classList.add('flash');
  }, 50);
}

function updateProgress() {
  const count = collectedTubes.length;
  document.getElementById('tubes-progress').textContent = count;
  const pct = Math.min((count / tubesNeeded) * 100, 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  renderCollectedMini();

  if (count >= tubesNeeded) {
    document.getElementById('sort-btn').disabled = false;
    document.getElementById('sort-btn').style.opacity = '1';
  }
}

function renderCollectedMini() {
  const row = document.getElementById('collected-mini');
  row.innerHTML = '';
  if (collectedTubes.length === 0) {
    row.innerHTML = '<span style="font-size:12px;color:var(--text2)">Nog geen buizen verzameld...</span>';
    return;
  }
  collectedTubes.forEach(tube => {
    const mt = document.createElement('div');
    mt.className = 'mini-tube';
    const layerH = 70 / TUBE_CAPACITY;
    tube.forEach(cid => {
      const l = document.createElement('div');
      l.className = 'mini-layer';
      l.style.height = layerH + 'px';
      l.style.background = cid ? COLORS[cid-1].hex : 'transparent';
      mt.appendChild(l);
    });
    row.appendChild(mt);
  });
}

function resetPhase1() {
  grid = Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(0));
  collectedTubes = [];
  selectedBlock = null;
  generateBlocks();
  renderGrid();
  renderBlocks();
  updateProgress();
}

// ─── PHASE 2: SORTING ─────────────────────────────────────
function goToPhase2() {
  if (collectedTubes.length < tubesNeeded) return;

  // Build sort tubes: use collected + add empty tubes
  tubes = collectedTubes.map(t => [...t]);
  // Shuffle the layers within each tube for challenge
  tubes = tubes.map(tube => {
    const filled = tube.filter(c => c > 0);
    const empty = tube.filter(c => c === 0);
    // Shuffle filled
    for (let i = filled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [filled[i], filled[j]] = [filled[j], filled[i]];
    }
    return [...empty, ...filled];
  });

  // Add extra empty tubes for maneuvering
  const extraEmpty = Math.ceil(tubes.length / 3);
  for (let i = 0; i < extraEmpty; i++) tubes.push(Array(TUBE_CAPACITY).fill(0));

  originalTubes = tubes.map(t => [...t]);
  sortHistory = [];
  selectedTube = -1;
  showPhase(2);
  renderTubes();
}

function showPhase(n) {
  document.getElementById('phase1').style.display = n === 1 ? 'flex' : 'none';
  document.getElementById('phase2').style.display = n === 2 ? 'flex' : 'none';
  document.getElementById('phase1-btn').className = `phase-btn ${n === 1 ? 'active' : 'inactive'}`;
  document.getElementById('phase2-btn').className = `phase-btn ${n === 2 ? 'active' : 'inactive'}`;
}

function renderTubes() {
  const container = document.getElementById('tubes-container');
  container.innerHTML = '';

  tubes.forEach((tube, i) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'tube';
    if (i === selectedTube) wrapper.classList.add('selected');
    if (isTubeComplete(tube)) wrapper.classList.add('complete');

    const top = document.createElement('div');
    top.className = 'tube-top';

    const body = document.createElement('div');
    body.className = 'tube-body';

    const layerH = 176 / TUBE_CAPACITY;
    tube.forEach((cid, li) => {
      const layer = document.createElement('div');
      layer.className = 'tube-layer';
      layer.style.height = layerH + 'px';
      layer.style.background = cid ? COLORS[cid-1].hex : 'transparent';
      body.appendChild(layer);
    });

    wrapper.appendChild(top);
    wrapper.appendChild(body);
    wrapper.addEventListener('click', () => clickTube(i));
    wrapper.addEventListener('touchstart', (e) => { e.preventDefault(); clickTube(i); }, {passive:false});
    container.appendChild(wrapper);
  });

  checkSortComplete();
}

function getTopColor(tube) {
  for (let i = tube.length - 1; i >= 0; i--) {
    if (tube[i] > 0) return { color: tube[i], idx: i };
  }
  return null;
}

function getEmptySlots(tube) {
  return tube.filter(c => c === 0).length;
}

function isTubeComplete(tube) {
  const filled = tube.filter(c => c > 0);
  if (filled.length === 0) return false;
  return filled.every(c => c === filled[0]) && filled.length === TUBE_CAPACITY;
}

function clickTube(i) {
  if (selectedTube === -1) {
    // Select if has content
    const top = getTopColor(tubes[i]);
    if (!top) return;
    selectedTube = i;
    renderTubes();
  } else if (selectedTube === i) {
    selectedTube = -1;
    renderTubes();
  } else {
    // Try to pour from selectedTube into i
    pourInto(selectedTube, i);
  }
}

function pourInto(from, to) {
  const fromTop = getTopColor(tubes[from]);
  if (!fromTop) { selectedTube = -1; renderTubes(); return; }

  const toTop = getTopColor(tubes[to]);
  const emptySlots = getEmptySlots(tubes[to]);

  // Can pour if: to is empty OR toTop matches fromTop color
  if (toTop && toTop.color !== fromTop.color) {
    selectedTube = to;
    renderTubes();
    return;
  }
  if (emptySlots === 0) { selectedTube = -1; renderTubes(); return; }

  // Count how many of the same color are on top of 'from'
  let count = 0;
  const topColor = fromTop.color;
  for (let i = tubes[from].length - 1; i >= 0; i--) {
    if (tubes[from][i] === topColor) count++;
    else break;
  }

  const canPour = Math.min(count, emptySlots);
  if (canPour === 0) { selectedTube = -1; renderTubes(); return; }

  // Save history
  sortHistory.push({ from, to, count: canPour, color: topColor, fromState: [...tubes[from]], toState: [...tubes[to]] });

  // Remove from 'from'
  let removed = 0;
  for (let i = tubes[from].length - 1; i >= 0 && removed < canPour; i--) {
    if (tubes[from][i] === topColor) { tubes[from][i] = 0; removed++; }
  }

  // Add to 'to' (fill from bottom empty)
  let added = 0;
  for (let i = 0; i < tubes[to].length && added < canPour; i++) {
    if (tubes[to][i] === 0) { tubes[to][i] = topColor; added++; }
  }

  selectedTube = -1;
  score += canPour * 20 * level;
  document.getElementById('score-display').textContent = score;
  renderTubes();
}

function undoPour() {
  if (!sortHistory.length) return;
  const last = sortHistory.pop();
  tubes[last.from] = last.fromState;
  tubes[last.to] = last.toState;
  selectedTube = -1;
  renderTubes();
}

function resetSort() {
  tubes = originalTubes.map(t => [...t]);
  sortHistory = [];
  selectedTube = -1;
  renderTubes();
}

function checkSortComplete() {
  const filled = tubes.filter(t => t.some(c => c > 0));
  if (filled.length === 0) return;
  const allComplete = filled.every(t => isTubeComplete(t));
  if (allComplete) showComplete();
}

function showComplete() {
  const bonus = Math.max(0, 1000 - sortHistory.length * 10) * level;
  score += bonus;
  document.getElementById('score-display').textContent = score;
  document.getElementById('overlay-score').textContent = '+' + bonus;

  const emojis = ['🎉', '🌊', '✨', '🎨', '💫'];
  document.getElementById('overlay-emoji').textContent = emojis[Math.floor(Math.random() * emojis.length)];
  document.getElementById('overlay-title').textContent = level > 3 ? 'Briljant!' : 'Level Klaar!';
  document.getElementById('overlay-sub').textContent = `Je hebt level ${level} voltooid met ${sortHistory.length} moves!`;

  setTimeout(() => document.getElementById('overlay').classList.add('show'), 300);
}

function nextLevel() {
  document.getElementById('overlay').classList.remove('show');
  level++;
  init();
}

// ─── START ────────────────────────────────────────────────
init();
</script>
